<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Vinheria Agnello</title>
    <meta name="description"
        content="Entre em contato com a Vinharia Agnello para tirar dúvidas e receber atendimento.">
    <meta name="keywords" content="contato, formulário, atendimento, vinho">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <br>
        <h1>Vinheria Agnello</h1>

        <nav>
            <a href="../../index.html">Início</a>
            <a href="historia.html">História</a>
            <a href="produtos.html">Produtos</a>
            <a href="harmonizacao.html">Harmonização</a>
            <a href="contato.html" class="ativo">Contato</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Entre em contato conosco!</h2>

            <p>
                Se você precisa de ajuda para escolher um vinho, envie sua mensagem para nossa equipe.
            </p>

            <form>

                <div class="linha">
                    <div>
                        <label for="nome">Nome:</label><br>
                        <input type="text" id="nome" name="nome" placeholder="Digite o seu nome" required >
                    </div>

                    <div>
                        <label for="email">E-mail:</label><br>
                        <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required>
                    </div>
                </div>

                <br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="6" cols="40" placeholder="Digite uma mensagem" required></textarea>

                <br><br>

                <button type="submit">Enviar</button>

            </form>

            <img src="../assets/imgs/contato.png" alt="Taça de vinho em mesa">
        </section>
    </main>

    <footer>
        <p>2026 - Vinheria Agnello</p>
    </footer>
</body>

</html>
